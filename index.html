<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smlouva – Agentura 42</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f0e8;
      --text:     #1a1a1a;
      --muted:    #555;
      --green:    #2d6a2d;
      --green-h:  #215021;
      --border:   #d6cfc0;
      --card:     #fff;
      --radius:   6px;
      --shadow:   0 2px 12px rgba(0,0,0,.08);
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      text-align: center;
    }
    header img {
      height: 48px;
      object-fit: contain;
    }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      letter-spacing: .5px;
      color: var(--text);
      text-decoration: none;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 44px 40px;
      width: 100%;
      max-width: 480px;
    }

    .card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.25;
    }

    .card .subtitle {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 32px;
      line-height: 1.55;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: var(--text);
    }

    input[type="text"] {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Lato', sans-serif;
      font-size: 17px;
      letter-spacing: .08em;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus {
      border-color: var(--green);
    }
    input[type="text"]::placeholder {
      color: #aaa;
      letter-spacing: .04em;
    }

    .hint {
      font-size: 12.5px;
      color: var(--muted);
      margin-top: 7px;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 28px;
      padding: 15px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Lato', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .03em;
      cursor: pointer;
      transition: background .18s, transform .1s;
    }
    .btn:hover  { background: var(--green-h); }
    .btn:active { transform: scale(.98); }
    .btn:disabled { background: #999; cursor: not-allowed; }

    /* ── RESULT BOXES ── */
    .result {
      display: none;
      margin-top: 28px;
      padding: 20px 22px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.6;
      border-left: 4px solid;
    }
    .result.info    { background: #e8f4e8; border-color: var(--green); color: #1a3d1a; }
    .result.warning { background: #fdf4e3; border-color: #c8860a; color: #5a3a00; }
    .result.error   { background: #fdecea; border-color: #c0392b; color: #5a1a1a; }
    .result.show    { display: block; }

    .result strong { display: block; margin-bottom: 4px; font-size: 15.5px; }

    /* ── SPINNER ── */
    .spinner {
      display: none;
      width: 22px; height: 22px;
      border: 3px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    .btn.loading .btn-label { display: none; }
    .btn.loading .spinner   { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 20px 16px;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--green); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <span class="logo-text">Agentura42</span>
</header>

<main>
  <div class="card">
    <h1>Stáhnout smlouvu</h1>
    <p class="subtitle">Zadej své rodné číslo a automaticky ti připravíme smlouvu s tvými údaji k podpisu.</p>

    <label for="rc">Rodné číslo</label>
    <input
      type="text"
      id="rc"
      placeholder="RRMMDD/XXXX"
      maxlength="11"
      autocomplete="off"
      inputmode="numeric"
    />
    <p class="hint">Zadej bez lomítka nebo s lomítkem, obojí funguje.</p>

    <button class="btn" id="submitBtn" onclick="handleSubmit()">
      <span class="btn-label">Pokračovat</span>
      <span class="spinner"></span>
    </button>

    <div class="result" id="result"></div>
  </div>
</main>

<footer>
  Dotazy? Piš na <a href="mailto:mozola@a42.cz">mozola@a42.cz</a> nebo přes
  <a href="https://m.me/marek.mozola" target="_blank">Messenger</a>.
</footer>

<script>
  // ── Konfigurace ──────────────────────────────────────────────
  // Sem vlož URL svého n8n webhooku:
  const WEBHOOK_URL = 'https://TVUJ-N8N-WEBHOOK-URL/rozcestnik';
  // ─────────────────────────────────────────────────────────────

  const input     = document.getElementById('rc');
  const btn       = document.getElementById('submitBtn');
  const resultBox = document.getElementById('result');

  // Formátování při psaní – přidá lomítko po 6 číslicích
  input.addEventListener('input', () => {
    let v = input.value.replace(/[^0-9]/g, '');
    if (v.length > 6) v = v.slice(0,6) + '/' + v.slice(6,10);
    input.value = v;
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });

  function showResult(type, title, text) {
    resultBox.className = `result ${type} show`;
    resultBox.innerHTML = `<strong>${title}</strong>${text}`;
  }

  async function handleSubmit() {
    const raw = input.value.replace(/[^0-9]/g, '');

    // Validace
    if (raw.length < 9 || raw.length > 10) {
      showResult('error', 'Neplatné rodné číslo', 'Zkontroluj, zda jsi zadal/a správný formát (např. 850315/1234).');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;
    resultBox.className = 'result';

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rc: raw })
      });

      const data = await response.json();

      if (data.status === 'new') {
        // Promotér není v databázi → přesměrování na registraci
        showResult('warning',
          'Jsi u nás nový/á 👋',
          `Ještě tě nemáme v systému. <a href="${data.registrationUrl}" target="_blank" style="color:var(--green);font-weight:700;">Klikni zde a vyplň registrační formulář</a> – zabere to jen pár minut.`
        );
      } else if (data.status === 'found') {
        // Promotér existuje → smlouva odeslána e-mailem
        showResult('info',
          '✓ Smlouva odeslána',
          `Na tvůj e-mail jsme poslali smlouvu předvyplněnou tvými údaji. Stáhni ji, nahraj na <a href="https://podepsat.online" target="_blank" style="color:var(--green);font-weight:700;">podepsat.online</a>, podepis a pošli zpět na <a href="mailto:smlouvy@a42.cz" style="color:var(--green);font-weight:700;">smlouvy@a42.cz</a>.`
        );
      } else {
        showResult('error', 'Něco se nepovedlo', 'Zkus to znovu nebo piš na mozola@a42.cz.');
      }

    } catch (err) {
      showResult('error',
        'Chyba připojení',
        'Nepodařilo se spojit se serverem. Zkus to za chvíli nebo piš na mozola@a42.cz.'
      );
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
